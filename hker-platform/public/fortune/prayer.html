<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雲端祈福 - HKER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@400;500&display=swap');
  body{ margin:0; background:#0b0908; color:#f2ece0; font-family:"Noto Sans TC",sans-serif; display:flex; justify-content:center; padding:24px 16px; }
  h2,h3{ font-family:"Noto Serif TC",serif; }
  #prayer-app{ max-width:600px; width:100%; border:1px solid rgba(201,162,39,.3); padding:24px; border-radius:16px; background:#181310; text-align:center; }
  .section{ margin-bottom:20px; }
  h2{ color:#e6c65c; font-size:22px; }
  select{ padding:10px; font-size:15px; border-radius:8px; background:#0b0908; color:#f2ece0; border:1px solid rgba(201,162,39,.3); }
  button.main-btn{ padding:12px 20px; font-size:15px; border-radius:999px; cursor:pointer; background:#a11423; color:#fff; border:none; font-weight:bold; }
  .options-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; text-align:left; padding:10px 0; }
  .option-item{ background:#0b0908; border:1px solid rgba(201,162,39,.2); padding:8px 10px; border-radius:8px; font-size:14px; }
  #result{ margin-top:20px; padding:16px; background:#0b0908; border-left:4px solid #c9a227; text-align:left; display:none; border-radius:8px; }
  .blessing-item{ color:#e5ddd0; margin-bottom:8px; line-height:1.6; font-size:14px; }
  .quote{ font-weight:bold; color:#e6c65c; margin-top:14px; text-align:center; border-top:1px dashed rgba(201,162,39,.2); padding-top:10px; font-size:13px; }
  .warn{ margin-top:16px; font-size:12px; color:#a89a86; border-top:1px dashed rgba(201,162,39,.2); padding-top:12px; }
  #musicBtn{ margin-bottom:16px; border-radius:999px; border:1px solid rgba(201,162,39,.4); background:rgba(0,0,0,.3); color:#f2ece0; padding:6px 14px; font-size:12px; cursor:pointer; }
</style>
</head>
<body>

<div id="prayer-app">
  <button id="musicBtn">🔊 音樂：開</button>
  <h2>🏮 雲端誠心祈福 🏮</h2>

  <div class="section">
    <label><b>請選擇神祇：</b></label><br><br>
    <select id="deity">
      <option value="觀世音菩薩">觀音</option>
      <option value="釋迦牟尼佛">佛祖</option>
      <option value="玉皇大帝">玉皇大帝</option>
      <option value="北極玄天上帝">玄天上帝</option>
      <option value="文武財神">財神</option>
      <option value="南極仙翁壽星公">壽星公</option>
      <option value="主耶穌">耶穌</option>
      <option value="聖母瑪利亞">聖母</option>
    </select>
  </div>

  <div class="section">
    <label><b>請選擇祈福事項（可多選）：</b></label>
    <div class="options-grid" id="category-list"></div>
  </div>

  <button class="main-btn" onclick="generateBlessing()">誠心跪拜並領取願福語</button>

  <div id="result">
    <h3 id="res-title"></h3>
    <div id="res-content"></div>
    <div class="quote" id="res-quote"></div>
  </div>

  <div class="warn">以上資訊只供參考，不可盡信，祝願大家好運和健康！</div>
</div>

<script>
// 音樂
let audioCtx=null, musicOn=true, musicTimer=null;
function ensureAudio(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }
function startMusic(){
  ensureAudio(); stopMusic();
  const notes=[392,440,493.88,587.33];
  let i=0;
  musicTimer=setInterval(()=>{
    if(!musicOn) return;
    const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
    osc.type='sine'; osc.frequency.value=notes[i%notes.length];
    gain.gain.setValueAtTime(0.0001,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.03,audioCtx.currentTime+0.05);
    gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+2.0);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime+2.0);
    i++;
  },2200);
}
function stopMusic(){ if(musicTimer) clearInterval(musicTimer); }
document.getElementById('musicBtn').addEventListener('click', ()=>{
  musicOn=!musicOn;
  document.getElementById('musicBtn').innerText = musicOn ? '🔊 音樂：開' : '🔇 音樂：關';
  if(musicOn){ ensureAudio(); startMusic(); } else { stopMusic(); }
});
startMusic();

  "工作": ["職位升遷，大展鴻圖。","事半功倍，效率倍增。","遇見伯樂，才華盡顯。","職場和諧，貴人相助。","創業成功，穩步發展。","克服困局，化險為夷。","思路清晰，決策果斷。","技能提升，專業領先。","保持熱情，不忘初心。","平衡勞逸，身心舒爽。","目標達成，業績長紅。","勇於承擔，累積經驗。","在挑戰中看見機會。","與同事精誠合作。","工作中展現慈悲與耐性。","不畏艱辛，終有回報。","心平氣和處理繁雜事務。","祝願事業一帆風順。"],
  "生活": ["平安喜樂，無憂無慮。","心寬體胖，知足常樂。","發現日常的美好。","遠離煩惱，清淨自在。","生活美滿，事事順心。","與大自然和諧共處。","享受每一刻的寧靜。","提升修養，優雅生活。","珍惜擁有，不卑不亢。","開拓視野，體驗人生。","居所安寧，鄰里和諧。","斷捨離，簡約而不簡單。","讓愛充滿生活的每個角落。","每天都有一個微笑的理由。","感恩食物，感恩陽光。","充滿希望，迎接晨曦。","內心強大，不畏風雨。","生活處處有驚喜。"],
  "運程": ["時來運轉，吉星高照。","趨吉避凶，平安大吉。","把握良機，乘勢而上。","衰氣散盡，好運連連。","心誠則靈，感應天心。","廣結善緣，增加福報。","沉著應變，化解危機。","財源滾動，福慧雙增。","路路通達，左右逢源。","善念一起，運勢自轉。","保持正念，避開負面磁場。","懂得放下，運氣自來。","在低谷中蓄勢待發。","順應天時，盡力而為。","勤行善事，積厚流光。","勇於改變，開啟新局。","謙虛受教，貴人自來。","祝願你一年四季走好運。"],
  "人事": ["廣結良緣，和睦共處。","遠離小人，親近君子。","說話得體，受人敬重。","寬容大量，化解怨恨。","真誠待人，換位思考。","提升親和力，廣受歡迎。","不卑不亢，應對自如。","化敵為友，圓融處理。","在人群中傳遞正能量。","學會傾聽，理解他人。","讚美他人，自得其樂。","謙卑自守，不與人爭。","在紛擾中保持清醒。","用慈悲心對待每個人。","建立互信，深厚友誼。","懂得拒絕，守護界限。","在人事中修行自我。","祝願你人緣極佳。"],
  "學業": ["金榜題名，學業有成。","智慧開啟，一讀即懂。","克服惰性，勤奮好學。","考試順利，發揮超卓。","遇到良師，受益匪淺。","舉一反三，靈活運用。","專注力強，抗擾度高。","持之以恆，必有收獲。","探索未知，熱愛知識。","學以致用，回饋社會。","思路敏捷，邏輯清晰。","在壓力中保持冷靜。","享受學習，不以為苦。","博覽群書，氣質自華。","謙虛求教，不恥下問。","打破瓶頸，更進一步。","定下目標，勇往直前。","祝願你學問日益精進。"],
  "健康": ["身強體健，百病不侵。","心情開朗，延年益壽。","睡眠安穩，體力充沛。","遠離病灶，康復神速。","規律作息，活力滿滿。","心血管通暢，筋骨舒展。","少思寡欲，精神奕奕。","飲食均衡，脾胃安和。","放下負擔，身心輕盈。","在運動中體悟生命。","珍惜身體，它是靈魂的聖殿。","呼吸順暢，內外清涼。","減少焦慮，自然安康。","笑口常開，就是良藥。","聽從醫囑，自律生活。","感恩每一口呼吸。","遠離毒素，回歸自然。","祝願你龍馬精神。"],
  "家庭": ["闔家平安，老少安康。","父慈子孝，家庭和睦。","夫妻恩愛，相敬如賓。","家和萬事興。","共同經營溫馨港灣。","化解矛盾，增進感情。","家庭成員互相關懷。","新添成員，喜氣洋洋。","共享天倫，歡樂常在。","傳承家風，厚德載物。","理解長輩，關愛晚輩。","把最好的脾氣留給家人。","家庭環境整潔清幽。","在困難中緊緊相依。","分享喜悅，分擔憂愁。","尊重長輩，耐心引導。","讓家成為心靈的避風港。","祝願你家庭幸福美滿。"]
};

const quotes = [
  "心誠則靈，日行一善，福報自來。",
  "熱愛家人，珍惜朋友，便是世間最大的修行。",
  "勇敢面對問題，逃避只會讓困難更堅硬。",
  "助人為快樂之本，多播善種，必收善果。",
  "境隨心轉，心寬路自闊。",
  "感恩當下的一切，那是獲得幸福的捷徑。"
];

const catDiv = document.getElementById('category-list');
Object.keys(data).forEach(cat => {
  catDiv.innerHTML += `<div class="option-item"><label><input type="checkbox" name="cat" value="${cat}"> ${cat}</label></div>`;
});

function generateBlessing() {
  const deity = document.getElementById('deity').value;
  const selectedCats = Array.from(document.querySelectorAll('input[name="cat"]:checked')).map(el => el.value);
  if (selectedCats.length === 0) { alert("請至少選擇一個祈福事項。"); return; }

  let html = "";
  selectedCats.forEach(cat => {
    const blessings = data[cat];
    const pick = blessings[Math.floor(Math.random() * blessings.length)];
    html += `<div class="blessing-item"><b style="color:#e6c65c">【${cat}】</b>：${pick}</div>`;
  });

  document.getElementById('res-title').innerText = `✨ ${deity} 給您的祝願 ✨`;
  document.getElementById('res-content').innerHTML = html;
  document.getElementById('res-quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById('result').style.display = "block";
}
</script>
</body>
</html>
