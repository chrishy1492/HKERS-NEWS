<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子脈衝輪盤 - 純娛樂版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background-color: #050505; color: #00f2ff; font-family: 'Orbitron', sans-serif; overflow: hidden; margin: 0; }
        .neon-border { box-shadow: 0 0 15px rgba(0, 242, 255, 0.5), inset 0 0 15px rgba(0, 242, 255, 0.2); border: 1px solid rgba(0, 242, 255, 0.5); }
        #gameCanvas { filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.6)); cursor: pointer; }
        .bet-btn { transition: all 0.2s ease; text-transform: uppercase; font-weight: bold; font-size: 0.75rem; }
        .bet-btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }
        .num-btn { width: 40px; height: 30px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(0, 242, 255, 0.3); background: rgba(255, 255, 255, 0.05); font-size: 0.7rem; cursor: pointer; }
        .num-btn:hover { background: #00f2ff; color: #000; }
        .winning-flash { animation: flash 0.4s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.05); } }
        .status-bar { background: rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(0, 242, 255, 0.3); }
        .disclaimer{ font-size:10px; color:#6b7280; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div class="p-3 flex justify-between items-center status-bar">
        <div class="text-lg">本局分數: <span id="balance" class="text-white">0</span></div>
        <div class="text-center hidden md:block">
            <div class="text-[10px] text-gray-400 uppercase tracking-widest">Quantum Engine</div>
            <div class="text-green-400 text-xs">純娛樂模式・積分結算需登入</div>
        </div>
        <div class="text-right text-sm">
            上局結果: <span id="history" class="text-pink-500 font-bold">--</span>
        </div>
    </div>

    <div class="flex-grow flex flex-col items-center justify-center p-2 relative overflow-hidden">
        <div id="announcement" class="absolute top-4 text-xl text-yellow-400 font-bold h-8 z-10 transition-all"></div>
        <canvas id="gameCanvas" width="560" height="560" class="mb-4"></canvas>

        <div class="w-full max-w-4xl flex flex-col md:flex-row gap-4 items-end bg-black/50 p-4 rounded-lg border border-white/10">
            <div class="flex-grow">
                <div class="text-[10px] mb-2 text-gray-400">猜一個數字</div>
                <div class="grid grid-cols-12 gap-1 bg-white/5 p-1 rounded">
                    <div id="numberPad" class="contents"></div>
                </div>
            </div>

            <div class="flex flex-col gap-2 min-w-[150px]">
                <div class="text-[10px] text-gray-400 text-right">或猜區域</div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="placeBet('RED')" class="bet-btn p-2 rounded bg-red-900/40 text-red-400 border border-red-500">紅</button>
                    <button onclick="placeBet('BLACK')" class="bet-btn p-2 rounded bg-gray-900/40 text-gray-400 border border-gray-500">黑</button>
                    <button onclick="placeBet('ODD')" class="bet-btn p-2 rounded bg-cyan-900/40 text-cyan-400 border border-cyan-500">單</button>
                    <button onclick="placeBet('EVEN')" class="bet-btn p-2 rounded bg-purple-900/40 text-purple-400 border border-purple-500">雙</button>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <button onclick="spin()" id="spinBtn" class="bg-cyan-500 text-black px-6 py-3 rounded font-bold hover:bg-white transition-all shadow-lg shadow-cyan-500/20">啟動脈衝</button>
                <button onclick="toggleMusic()" id="musicBtn" class="bg-gray-800 border border-gray-600 text-gray-300 px-4 py-2 rounded text-xs hover:bg-gray-700 transition">🔊 音樂：開</button>
            </div>
        </div>
    </div>

    <div class="p-2 text-[9px] text-gray-600 grid grid-cols-3 gap-4 border-t border-gray-900 bg-black">
        <div><span class="text-gray-400 font-bold block">玩法</span>點擊數字或區域選擇，粒子核心旋轉數秒即出結果。</div>
        <div><span class="text-gray-400 font-bold block">聲明</span>結果由前端隨機函式產生，純屬娛樂展示。</div>
        <div class="disclaimer">
            積分結算需登入 HKER 帳號，每日透過遊戲增減的積分有上限，不可兌換、不可提現、不與任何真實貨幣連動。
            <span id="settleStatus" class="ml-2"></span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const balanceEl = document.getElementById('balance');
        const announcementEl = document.getElementById('announcement');
        const historyEl = document.getElementById('history');
        const numberPad = document.getElementById('numberPad');

        let balance = 0;
        let isSpinning = false;
        let rotation = 0;
        let speed = 0;
        let particles = [];
        let currentBet = null;

        // 【新增】累積本次遊戲階段的淨分數變化
        let pendingDelta = 0;
        let settled = false;

        const wheelNumbers = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        const REDS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

        const COLORS = { red: '#ff2d55', black: '#1c1c1e', green: '#00ff66', cyan: '#00f2ff', gold: '#ffcc00' };

        // ---- 音樂：簡易自產環境音，避免版權問題 ----
        let audioCtx=null, musicOn=true, musicTimer=null;
        function ensureAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
        function startMusic(){
          ensureAudio(); stopMusic();
          const notes=[392,466.16,523.25,587.33];
          let i=0;
          musicTimer=setInterval(()=>{
            if(!musicOn) return;
            const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
            osc.type='sine'; osc.frequency.value=notes[i%notes.length];
            gain.gain.setValueAtTime(0.0001,audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.025,audioCtx.currentTime+0.05);
            gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+1.1);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime+1.1);
            i++;
          },1400);
        }
        function stopMusic(){ if(musicTimer) clearInterval(musicTimer); }
        function toggleMusic(){
          musicOn=!musicOn;
          document.getElementById('musicBtn').innerText = musicOn ? '🔊 音樂：開' : '🔇 音樂：關';
          if(musicOn){ ensureAudio(); startMusic(); } else { stopMusic(); }
        }

        function initNumberPad() {
            for(let i=1; i<=36; i++) {
                const btn = document.createElement('div');
                btn.className = 'num-btn';
                btn.innerText = i;
                btn.onclick = () => placeBet(i);
                numberPad.appendChild(btn);
            }
        }

        function createParticles() {
            for(let i=0; i<60; i++) {
                particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.5, speed: 0.2+Math.random()*0.5 });
            }
        }

        function drawWheel(angle) {
            const centerX = canvas.width/2, centerY = canvas.height/2, radius = 240, innerRadius = 185;
            ctx.clearRect(0,0,canvas.width,canvas.height);

            particles.forEach(p => {
                ctx.fillStyle = 'rgba(0, 242, 255, 0.2)';
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
                p.y -= p.speed; if(p.y<0) p.y = canvas.height;
            });

            ctx.shadowBlur = 20; ctx.shadowColor = COLORS.cyan;
            const segments = wheelNumbers.length;
            const segmentAngle = (2*Math.PI)/segments;

            for (let i=0; i<segments; i++) {
                const startAngle = (i*segmentAngle) + angle - Math.PI/2 - segmentAngle/2;
                const endAngle = startAngle + segmentAngle;
                ctx.beginPath(); ctx.moveTo(centerX,centerY); ctx.arc(centerX,centerY,radius,startAngle,endAngle);
                const num = wheelNumbers[i];
                ctx.fillStyle = num===0 ? COLORS.green : (REDS.includes(num) ? COLORS.red : COLORS.black);
                ctx.fill(); ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1; ctx.stroke();

                ctx.save(); ctx.translate(centerX,centerY); ctx.rotate(startAngle+segmentAngle/2);
                ctx.textAlign = "center"; ctx.fillStyle = "white"; ctx.font = "bold 15px Orbitron";
                ctx.fillText(num, radius-20, 5); ctx.restore();
            }

            ctx.shadowBlur = 30; ctx.shadowColor = COLORS.cyan; ctx.fillStyle = '#050505';
            ctx.beginPath(); ctx.arc(centerX,centerY,innerRadius,0,Math.PI*2); ctx.fill();

            ctx.shadowBlur = 10; ctx.strokeStyle = COLORS.cyan; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(centerX,centerY,innerRadius-10,0,Math.PI*2); ctx.stroke();

            ctx.fillStyle = COLORS.cyan; ctx.font = "bold 16px Orbitron";
            ctx.textAlign = "center"; ctx.fillText("純娛樂", centerX, centerY+5);

            ctx.shadowBlur = 15; ctx.fillStyle = COLORS.cyan;
            ctx.beginPath(); ctx.moveTo(centerX, centerY-radius-10);
            ctx.lineTo(centerX-15, centerY-radius-35); ctx.lineTo(centerX+15, centerY-radius-35); ctx.fill();
        }

        function placeBet(val) {
            if (isSpinning) return;
            currentBet = { val };
            announcementEl.innerText = `已選擇: ${val}`;
            announcementEl.style.color = '#00f2ff';
        }

        function spin() {
            if (isSpinning) return;
            if (!currentBet) {
                announcementEl.innerText = "請先選擇數字或區域";
                announcementEl.style.color = '#ffcc00';
                return;
            }
            isSpinning = true;
            let targetSpeed = 0.4 + Math.random()*0.2;
            speed = targetSpeed;
            let duration = 4000;
            let startTime = null;

            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                let progress = timestamp - startTime;
                if (progress < duration) {
                    rotation += speed;
                    if (progress > duration*0.6) speed *= 0.985;
                    drawWheel(rotation);
                    requestAnimationFrame(animate);
                } else {
                    finalizeResult();
                }
            }
            requestAnimationFrame(animate);
        }

        function finalizeResult() {
            isSpinning = false;
            const totalSegments = wheelNumbers.length;
            const segmentAngle = (2*Math.PI)/totalSegments;
            let normalizedRotation = (rotation % (2*Math.PI));
            let index = Math.floor(((2*Math.PI - normalizedRotation) % (2*Math.PI)) / segmentAngle);
            index = index % totalSegments;

            const resultNum = wheelNumbers[index];
            const isRed = REDS.includes(resultNum);
            const resultColor = resultNum===0 ? 'GREEN' : (isRed ? 'RED' : 'BLACK');
            const resultOddEven = resultNum % 2 === 0 ? 'EVEN' : 'ODD';

            let won = false;
            if (typeof currentBet.val === 'number') {
                if (currentBet.val === resultNum) won = true;
            } else {
                if (currentBet.val === resultColor || currentBet.val === resultOddEven) won = true;
            }

            historyEl.innerText = `${resultNum}`;

            if (won) {
                const gain = typeof currentBet.val === 'number' ? 35 : 2;
                balance += gain;
                pendingDelta += gain; // 【新增】累積到本局結算變數
                announcementEl.innerText = `猜中了！+${gain} 分`;
                announcementEl.classList.add('winning-flash');
                setTimeout(() => announcementEl.classList.remove('winning-flash'), 1500);
            } else {
                announcementEl.innerText = `沒猜中，結果是 ${resultNum}`;
                announcementEl.style.color = '#ff2d55';
            }

            balanceEl.innerText = balance;
            currentBet = null;
        }

        // ============================================================
        // 【新增】結算邏輯：把本局累積的淨分數送到後端 API，
        // 由後端驗證登入身分、檢查每日上限後，才真正寫入資料庫。
        // ============================================================
        async function settleScore(useBeacon){
          if(settled || pendingDelta === 0) return;
          settled = true;
          const payload = JSON.stringify({ game: 'roulette', delta: pendingDelta });

          try{
            if(useBeacon && navigator.sendBeacon){
              const blob = new Blob([payload], { type: 'application/json' });
              navigator.sendBeacon('/api/games/settle', blob);
            } else {
              await fetch('/api/games/settle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: payload,
                credentials: 'include',
              });
              const el = document.getElementById('settleStatus');
              if(el) el.innerText = '本局積分已結算';
            }
          } catch(e){
            console.error('settle failed', e);
          }
        }

        document.addEventListener('visibilitychange', () => {
          if(document.visibilityState === 'hidden'){
            settleScore(true);
          }
        });
        window.addEventListener('pagehide', () => settleScore(true));

        initNumberPad();
        createParticles();
        drawWheel(0);
    </script>
</body>
</html>
