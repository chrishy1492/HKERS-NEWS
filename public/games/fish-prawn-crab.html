<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魚蝦蟹 - 純娛樂版</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{ background:#0f172a; color:#f1f5f9; font-family:"Microsoft JhengHei",sans-serif; }
  .dice{ width:72px; height:72px; border-radius:14px; background:#fff; display:flex; align-items:center; justify-content:center; font-size:34px; box-shadow:0 4px 12px rgba(0,0,0,.4); }
  .shaking{ animation: shake 0.15s infinite; }
  @keyframes shake{ 0%{transform:translate(0,0) rotate(0)} 25%{transform:translate(-4px,3px) rotate(-8deg)} 50%{transform:translate(4px,-3px) rotate(8deg)} 75%{transform:translate(-3px,-2px) rotate(-5deg)} 100%{transform:translate(0,0) rotate(0)} }
  .pick{ cursor:pointer; border:2px solid transparent; transition:.15s; }
  .pick.selected{ border-color:#22d3ee; box-shadow:0 0 12px #22d3ee; transform:scale(1.05); }
  .disclaimer{ font-size:11px; color:#94a3b8; }
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

  <h1 class="text-2xl font-bold mb-1">🐟🦐🦀 魚蝦蟹</h1>
  <p class="disclaimer mb-4">純娛樂單機小遊戲・不記錄・不累計・不涉及任何帳戶或真實價值</p>

  <div class="flex items-center gap-4 mb-4">
    <span class="text-sm text-gray-400">本局分數（重新整理後歸零）：</span>
    <span id="score" class="text-xl font-bold text-cyan-400">0</span>
  </div>

  <div class="flex gap-3 mb-6" id="diceRow">
    <div class="dice" id="d0">🐟</div>
    <div class="dice" id="d1">🦐</div>
    <div class="dice" id="d2">🦀</div>
  </div>

  <p class="text-sm text-gray-400 mb-2">請選擇一個圖案（可猜猜看等下會開出什麼）：</p>
  <div class="grid grid-cols-3 gap-3 mb-6" id="pickGrid"></div>

  <div id="message" class="h-8 text-lg font-bold mb-4 text-yellow-400"></div>

  <div class="flex gap-3">
    <button id="rollBtn" class="px-8 py-3 bg-yellow-500 text-black font-bold rounded-full hover:bg-white transition">開骰</button>
    <button id="musicBtn" class="px-4 py-3 bg-gray-800 border border-gray-600 rounded-full text-sm hover:bg-gray-700 transition">🔊 音樂：開</button>
    <button id="speedBtn" class="px-4 py-3 bg-gray-800 border border-gray-600 rounded-full text-sm hover:bg-gray-700 transition">⚡ 速度：x1</button>
  </div>

  <p class="disclaimer mt-6 max-w-md text-center">本遊戲結果由前端隨機函式產生，僅供休閒娛樂，畫面分數不具任何真實價值，不可兌換、不可提現、不與任何帳戶或代幣連動。</p>

<script>
// ---- 音樂 ----
let audioCtx=null, musicOn=true, musicTimer=null;
function ensureAudio(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }
function startMusic(){
  ensureAudio(); stopMusic();
  const notes=[440,523.25,659.25,587.33];
  let i=0;
  musicTimer=setInterval(()=>{
    if(!musicOn) return;
    const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
    osc.type='sine'; osc.frequency.value=notes[i%notes.length];
    gain.gain.setValueAtTime(0.0001,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.03,audioCtx.currentTime+0.05);
    gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+1.0);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime+1.0);
    i++;
  },1300);
}
function stopMusic(){ if(musicTimer) clearInterval(musicTimer); }
document.getElementById('musicBtn').addEventListener('click', ()=>{
  musicOn=!musicOn;
  document.getElementById('musicBtn').innerText = musicOn ? '🔊 音樂：開' : '🔇 音樂：關';
  if(musicOn){ ensureAudio(); startMusic(); } else { stopMusic(); }
});

let speedMultiplier = 1;
document.getElementById('speedBtn').addEventListener('click', ()=>{
  speedMultiplier = speedMultiplier === 1 ? 2 : 1;
  document.getElementById('speedBtn').innerText = `⚡ 速度：x${speedMultiplier}`;
});

// ---- 圖案 ----
const FACES = ["🐟","🦐","🦀","💰","🍐","🐔"]; // 魚 蝦 蟹 金錢 葫蘆 雞
const pickGrid = document.getElementById('pickGrid');
let selected = null;
FACES.forEach(f=>{
  const div = document.createElement('div');
  div.className = 'dice pick';
  div.innerText = f;
  div.addEventListener('click', ()=>{
    document.querySelectorAll('.pick').forEach(el=>el.classList.remove('selected'));
    div.classList.add('selected');
    selected = f;
  });
  pickGrid.appendChild(div);
});

let score = 0;
let rolling = false;

function roll(){
  if(rolling) return;
  if(!selected){
    document.getElementById('message').innerText = "請先選一個圖案再開骰！";
    return;
  }
  rolling = true;
  const diceEls = [document.getElementById('d0'), document.getElementById('d1'), document.getElementById('d2')];
  diceEls.forEach(el => el.classList.add('shaking'));
  document.getElementById('message').innerText = "搖骰中...";

  const duration = 1500 / speedMultiplier;

  const shakeInterval = setInterval(()=>{
    diceEls.forEach(el => el.innerText = FACES[Math.floor(Math.random()*FACES.length)]);
  }, 80);

  setTimeout(()=>{
    clearInterval(shakeInterval);
    diceEls.forEach(el => el.classList.remove('shaking'));

    const results = [0,1,2].map(()=> FACES[Math.floor(Math.random()*FACES.length)]);
    diceEls.forEach((el,i)=> el.innerText = results[i]);

    const hits = results.filter(r => r === selected).length;
    let gain = 0;
    if(hits === 1) gain = 1;
    else if(hits === 2) gain = 2;
    else if(hits === 3) gain = 3;

    if(gain > 0){
      score += gain;
      document.getElementById('message').innerText = `中了 ${hits} 個「${selected}」！+${gain} 分`;
    } else {
      document.getElementById('message').innerText = `這局沒中，再試一次！`;
    }
    document.getElementById('score').innerText = score;
    rolling = false;
  }, duration);
}

document.getElementById('rollBtn').addEventListener('click', roll);
</script>
</body>
</html>
